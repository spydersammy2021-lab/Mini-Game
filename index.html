<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>00 VENOM | FRUIT SLAYER TITAN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Poppins:wght@300;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }

        body {
            background: radial-gradient(circle at center, #2a0000 0%, #000 100%);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* EKRAN STARTOWY */
        #start-screen {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; backdrop-filter: blur(15px);
        }

        .welcome-box {
            border: 2px solid #ff0000;
            padding: 50px;
            border-radius: 40px;
            background: rgba(255, 0, 0, 0.05);
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.3);
            animation: glow 2s infinite alternate;
        }
        @keyframes glow { from { box-shadow: 0 0 20px rgba(255,0,0,0.2); } to { box-shadow: 0 0 60px rgba(255,0,0,0.5); } }

        .btn-start {
            margin-top: 30px;
            padding: 20px 60px;
            font-family: 'Orbitron';
            font-weight: 900;
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 20px;
            transition: 0.3s;
        }
        .btn-start:hover { transform: scale(1.1); box-shadow: 0 0 30px #ff0000; }

        /* UI GRY */
        .ui {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 40px; z-index: 100; font-family: 'Orbitron';
            background: rgba(255,255,255,0.05); padding: 15px 40px; border-radius: 50px;
            border: 1px solid rgba(255,0,0,0.2); backdrop-filter: blur(10px);
        }
        .stat span { color: #ff0000; font-weight: 900; }

        /* OBIEKTY */
        .fruit {
            position: absolute; font-size: 60px; user-select: none;
            filter: drop-shadow(0 0 15px rgba(255,0,0,0.4));
            cursor: pointer; transition: transform 0.1s;
        }

        /* ANTY-SPAM */
        #spam-alert {
            display: none; position: fixed; inset: 0; background: rgba(255,0,0,0.95);
            z-index: 3000; flex-direction: column; align-items: center; justify-content: center;
        }

        .slice-effect {
            position: absolute; width: 150px; height: 3px; background: white;
            box-shadow: 0 0 20px #ff0000; pointer-events: none;
            animation: sliceAnim 0.4s forwards;
        }
        @keyframes sliceAnim { 
            0% { transform: scaleX(0) rotate(var(--r)); opacity: 1; }
            100% { transform: scaleX(1.5) rotate(var(--r)); opacity: 0; }
        }
    </style>
</head>
<body onclick="handleGlobalClick(event)">

    <div id="start-screen">
        <div class="welcome-box">
            <h1 style="font-family:'Orbitron'; font-size: 40px; color: #ff0000;">WITAJ W MINIGRA 00 VENOMA</h1>
            <p style="margin-top: 15px; font-size: 18px; color: #ccc;">
                PRZECINAJ ARBUZY, BANANY I INNE OWOCE!<br>
                ZDOBĄDŹ JAK NAJWIĘCEJ PUNKTÓW DLA LEGIONU.<br>
                <span style="color:red; font-weight:bold;">UWAGA: SYSTEM TITAN WYKRYWA SPAMOWANIE!</span>
            </p>
            <button class="btn-start" onclick="initGame()">INICJUJ PROTOKÓŁ</button>
        </div>
    </div>

    <div class="ui">
        <div class="stat">PUNKTY: <span id="score">0</span></div>
        <div class="stat">ŻYCIE: <span id="lives">3</span></div>
    </div>

    <div id="game-area"></div>

    <div id="spam-alert">
        <h1 style="font-family:'Orbitron'; font-size: 60px;">WYKRYTO SPAM!</h1>
        <p style="font-size: 24px; margin: 20px 0;">GRA WSTRZYMANA PRZEZ SYSTEM TITAN</p>
        <button class="btn-start" style="background:white; color:red;" onclick="resumeGame()">POWRÓT DO GRY</button>
    </div>

    <script>
        const area = document.getElementById('game-area');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const spamEl = document.getElementById('spam-alert');
        
        let score = 0;
        let lives = 3;
        let active = false;
        let fruitLoop;
        
        // System anty-spam
        let clicks = 0;
        let lastTime = Date.now();

        function handleGlobalClick(e) {
            if (!active) return;
            const now = Date.now();
            
            // Jeśli klikasz szybciej niż co 80ms, system liczy to jako spam
            if (now - lastTime < 80) clicks++;
            else clicks = 0;
            
            lastTime = now;

            if (clicks > 8) {
                stopGame();
                spamEl.style.display = 'flex';
            }

            // Efekt cięcia
            const slice = document.createElement('div');
            slice.className = 'slice-effect';
            slice.style.left = e.clientX - 75 + 'px';
            slice.style.top = e.clientY + 'px';
            slice.style.setProperty('--r', Math.random() * 360 + 'deg');
            document.body.appendChild(slice);
            setTimeout(() => slice.remove(), 400);
        }

        function initGame() {
            document.getElementById('start-screen').style.display = 'none';
            active = true;
            startGameLoop();
        }

        function resumeGame() {
            spamEl.style.display = 'none';
            clicks = 0;
            active = true;
            startGameLoop();
        }

        function stopGame() {
            active = false;
            clearInterval(fruitLoop);
        }

        const fruits = ['🍉', '🍌', '🍒', '🍋', '🍇', '🍎'];

        function spawn() {
            if (!active) return;
            const f = document.createElement('div');
            f.className = 'fruit';
            f.innerText = fruits[Math.floor(Math.random() * fruits.length)];
            f.style.left = Math.random() * (window.innerWidth - 100) + 'px';
            f.style.bottom = "-100px";
            area.appendChild(f);

            let vy = Math.random() * 10 + 12;
            let vx = (Math.random() - 0.5) * 6;
            let py = -100;
            let px = parseFloat(f.style.left);

            const m = setInterval(() => {
                if (!active) { clearInterval(m); f.remove(); return; }
                vy -= 0.35; // Grawitacja
                py += vy;
                px += vx;
                f.style.bottom = py + 'px';
                f.style.left = px + 'px';
                f.style.transform = `rotate(${py}deg)`;

                if (py < -150) {
                    clearInterval(m);
                    f.remove();
                    if(active) {
                        lives--;
                        livesEl.innerText = lives;
                        if(lives <= 0) {
                            alert("GAME OVER! WYNIK: " + score);
                            location.reload();
                        }
                    }
                }
            }, 20);

            f.onmouseover = () => {
                score += 10;
                scoreEl.innerText = score;
                f.style.transform = "scale(1.8) rotate(45deg)";
                f.style.opacity = "0";
                setTimeout(() => { clearInterval(m); f.remove(); }, 100);
            };
        }

        function startGameLoop() {
            fruitLoop = setInterval(spawn, 900);
        }
    </script>
</body>
</html>
