<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>FRUIT SNIPER ELITE</title>
    <style>
        :root {
            --primary: #00ff41; /* Neonowy zielony jak w Matrixie/Splinter Cell */
            --danger: #ff4b2b;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: none;
        }

        /* TŁO - LAS / POLANA */
        #game-world {
            position: fixed; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-position: center;
            transition: transform 0.1s ease-out;
        }

        /* UI - HUD (Pasek na górze) */
        #hud {
            position: fixed; top: 0; left: 0; width: 100%; height: 80px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 50px; box-sizing: border-box; z-index: 1000;
            color: var(--primary); letter-spacing: 2px;
        }

        .stat-box {
            background: var(--glass); backdrop-filter: blur(10px);
            padding: 10px 25px; border-radius: 5px; border: 1px solid var(--primary);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
        }

        /* CELOWNIK PRO */
        #scope {
            position: fixed; width: 400px; height: 400px;
            border: 2px solid rgba(0, 255, 65, 0.5); border-radius: 50%;
            box-shadow: 0 0 0 2000px rgba(0,0,0,0.85); /* Ciemność lunety */
            pointer-events: none; z-index: 900; transform: translate(-50%, -50%);
            display: flex; justify-content: center; align-items: center;
        }
        
        #scope::before { /* Linie pomocnicze */
            content: ''; position: absolute; width: 100%; height: 1px; background: rgba(0, 255, 65, 0.3);
        }
        #scope::after {
            content: ''; position: absolute; width: 1px; height: 100%; background: rgba(0, 255, 65, 0.3);
        }

        .dot { width: 4px; height: 4px; background: var(--danger); border-radius: 50%; box-shadow: 0 0 10px var(--danger); }

        /* ARBUZY - LEPSZY WYGLĄD */
        .target {
            position: absolute; width: 90px; height: 70px;
            background: #2d5a27; border-radius: 50%;
            border: 3px solid #1e3c1a;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.5);
            z-index: 500;
        }

        /* EFEKT ROZBRYZGU (Krew arbuza) */
        .splatter {
            position: absolute; width: 150px; height: 150px;
            background: radial-gradient(circle, var(--danger) 10%, transparent 70%);
            border-radius: 50%; pointer-events: none; z-index: 400;
            animation: fadeOut 0.5s forwards;
        }

        @keyframes fadeOut { from { opacity: 1; transform: scale(0.5); } to { opacity: 0; transform: scale(1.5); } }

        /* EFEKT STRZAŁU */
        #muzzle-flash {
            position: fixed; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none; z-index: 2000;
        }
    </style>
</head>
<body>

<div id="muzzle-flash"></div>
<div id="hud">
    <div class="stat-box">TARGETS ELIMINATED: <span id="score">0</span></div>
    <div style="font-size: 24px; font-weight: bold;">SNIPER OPS: FRUIT SECTOR</div>
    <div class="stat-box">AMMO: <span id="ammo">∞</span></div>
</div>

<div id="scope"><div class="dot"></div></div>
<div id="game-world"></div>

<script>
    let score = 0;
    const world = document.getElementById('game-world');
    const scope = document.getElementById('scope');
    const flash = document.getElementById('muzzle-flash');
    const scoreText = document.getElementById('score');

    // Ruch lunety i lekka paralaksa tła
    window.onmousemove = (e) => {
        scope.style.left = e.clientX + 'px';
        scope.style.top = e.clientY + 'px';
        
        // Tło rusza się delikatnie w przeciwną stronę (efekt głębi)
        let moveX = (e.clientX - window.innerWidth / 2) * 0.01;
        let moveY = (e.clientY - window.innerHeight / 2) * 0.01;
        world.style.transform = `scale(1.1) translate(${-moveX}px, ${-moveY}px)`;
    }

    // Strzał
    window.onclick = () => {
        flash.style.opacity = '0.3';
        setTimeout(() => flash.style.opacity = '0', 40);
        
        // Odrzut lunety
        scope.style.transform = 'translate(-50%, -60%) scale(1.05)';
        setTimeout(() => scope.style.transform = 'translate(-50%, -50%) scale(1)', 100);
    }

    function spawnTarget() {
        const target = document.createElement('div');
        target.className = 'target';
        
        let x = Math.random() * (window.innerWidth - 150) + 75;
        let y = window.innerHeight + 100;
        target.style.left = x + 'px';
        
        world.appendChild(target);

        let velocityY = -18 - Math.random() * 10;
        let velocityX = (Math.random() - 0.5) * 6;
        let gravity = 0.4;

        let moveInterval = setInterval(() => {
            velocityY += gravity;
            y += velocityY;
            x += velocityX;
            target.style.top = y + 'px';
            target.style.left = x + 'px';

            if (y > window.innerHeight + 200) {
                clearInterval(moveInterval);
                target.remove();
            }
        }, 16);

        target.onmousedown = (e) => {
            score++;
            scoreText.innerText = score;
            
            // Efekt rozbryzgu
            const splash = document.createElement('div');
            splash.className = 'splatter';
            splash.style.left = (x - 30) + 'px';
            splash.style.top = (y - 30) + 'px';
            world.appendChild(splash);
            setTimeout(() => splash.remove(), 500);

            clearInterval(moveInterval);
            target.remove();
        };
    }

    // Start generowania
    setInterval(spawnTarget, 1200);
</script>

</body>
</html>
