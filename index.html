<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITAN MINIGAME | FRUIT SLAYER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Poppins:wght@300;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }

        body {
            background: radial-gradient(circle at center, #1a0000 0%, #000 100%);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            cursor: crosshair;
            overflow: hidden;
        }

        /* UI GRY */
        .ui-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 15px 40px;
            border-radius: 50px;
            border: 1px solid rgba(255, 0, 0, 0.3);
            display: flex;
            gap: 30px;
            z-index: 100;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.2);
        }

        .stat-item { font-family: 'Orbitron'; font-size: 20px; font-weight: 900; }
        .stat-item span { color: #ff0000; text-shadow: 0 0 10px #ff0000; }

        /* OWOCE */
        .fruit {
            position: absolute;
            font-size: 50px;
            user-select: none;
            transition: transform 0.1s;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
        }

        /* EFEKT KLIKNIĘCIA */
        .slice-effect {
            position: absolute;
            width: 100px;
            height: 2px;
            background: white;
            box-shadow: 0 0 20px #ff0000;
            transform-origin: center;
            animation: sliceAnim 0.3s forwards;
            pointer-events: none;
        }
        @keyframes sliceAnim {
            0% { transform: scaleX(0) rotate(var(--r)); opacity: 1; }
            100% { transform: scaleX(1.5) rotate(var(--r)); opacity: 0; }
        }

        /* POWIADOMIENIE ANTY-SPAM */
        #spam-alert {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255, 0, 0, 0.9);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            animation: flash 0.5s infinite;
        }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        #spam-alert h1 { font-family: 'Orbitron'; font-size: 50px; margin-bottom: 20px; }
        #spam-alert button {
            padding: 15px 40px;
            font-weight: 900;
            text-transform: uppercase;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            background: white;
            font-family: 'Orbitron';
        }

        /* CZĄSTECZKI TŁA */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255, 0, 0, 0.1);
            filter: blur(100px);
            border-radius: 50%;
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body onclick="checkSpam(event)">

    <div class="bg-glow" style="top: 20%; left: 20%;"></div>
    <div class="bg-glow" style="bottom: 20%; right: 20%;"></div>

    <div class="ui-panel">
        <div class="stat-item">PUNKTY: <span id="score">0</span></div>
        <div class="stat-item">ŻYCIE: <span id="lives">3</span></div>
    </div>

    <div id="game-container"></div>

    <div id="spam-alert">
        <h1>🚨 GRA WSTRZYMANA 🚨</h1>
        <p style="font-size: 24px; margin-bottom: 30px;">WYKRYTO SPAMOWANIE KLIKNIĘĆ!</p>
        <button onclick="resumeGame()">WZNAWIAM SYSTEM TITAN</button>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const spamAlert = document.getElementById('spam-alert');

        let score = 0;
        let lives = 3;
        let gameActive = true;
        let fruitInterval;

        // --- SYSTEM ANTY-SPAM ---
        let clickCount = 0;
        let lastClickTime = Date.now();

        function checkSpam(e) {
            if (!gameActive) return;
            
            const now = Date.now();
            if (now - lastClickTime < 100) { // Jeśli klika szybciej niż 0.1s
                clickCount++;
            } else {
                clickCount = 0;
            }
            
            lastClickTime = now;

            if (clickCount > 10) { // Wykryto spam
                gameActive = false;
                spamAlert.style.display = 'flex';
                clearInterval(fruitInterval);
            }
            
            // Efekt wizualny cięcia
            createSliceEffect(e.clientX, e.clientY);
        }

        function resumeGame() {
            clickCount = 0;
            gameActive = true;
            spamAlert.style.display = 'none';
            startGame();
        }

        function createSliceEffect(x, y) {
            const slice = document.createElement('div');
            slice.className = 'slice-effect';
            slice.style.left = x - 50 + 'px';
            slice.style.top = y + 'px';
            slice.style.setProperty('--r', Math.random() * 360 + 'deg');
            document.body.appendChild(slice);
            setTimeout(() => slice.remove(), 300);
        }

        // --- LOGIKA OWOCÓW ---
        const fruitTypes = ['🍉', '🍌', '🍒', '🍋', '🍎', '🍇'];

        function createFruit() {
            if (!gameActive) return;

            const fruit = document.createElement('div');
            fruit.className = 'fruit';
            fruit.innerText = fruitTypes[Math.floor(Math.random() * fruitTypes.length)];
            
            const startX = Math.random() * (window.innerWidth - 50);
            fruit.style.left = startX + 'px';
            fruit.style.bottom = "-100px";
            
            container.appendChild(fruit);

            let posY = -100;
            let posX = startX;
            let speedY = Math.random() * 8 + 10; // Prędkość w górę
            let speedX = (Math.random() - 0.5) * 4; // Lekki skos
            let gravity = 0.4;

            const move = setInterval(() => {
                if (!gameActive) { clearInterval(move); fruit.remove(); return; }

                posY += speedY;
                speedY -= gravity;
                posX += speedX;

                fruit.style.bottom = posY + 'px';
                fruit.style.left = posX + 'px';
                fruit.style.transform = `rotate(${posY}deg)`;

                // Jeśli owoc spadnie
                if (posY < -150) {
                    clearInterval(move);
                    fruit.remove();
                    if (gameActive) {
                        lives--;
                        livesEl.innerText = lives;
                        if (lives <= 0) gameOver();
                    }
                }
            }, 20)

            fruit.onmouseenter = () => { // "Przecięcie" owocu
                score += 10;
                scoreEl.innerText = score;
                fruit.style.transform = "scale(1.5)";
                fruit.style.opacity = "0";
                setTimeout(() => {
                    clearInterval(move);
                    fruit.remove();
                }, 100);
            };
        }

        function startGame() {
            clearInterval(fruitInterval);
            fruitInterval = setInterval(createFruit, 1000);
        }

        function gameOver() {
            gameActive = false;
            alert("KONIEC GRY! TWÓJ WYNIK: " + score);
            location.reload();
        }

        startGame();
    </script>
</body>
</html>
